<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wireframe Layout</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f5f5f5;
        color: #333;
      }

      /* HEADER */
      header {
        background: #fff;
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #ddd;
      }

      .logo {
        font-weight: bold;
      }

      nav a {
        margin-left: 20px;
        text-decoration: none;
        color: #333;
      }

      /* HERO */
      .hero {
        background: #eaeaea;
        padding: 80px 40px;
        text-align: center;
      }

      .hero h1 {
        font-size: 40px;
        margin-bottom: 10px;
      }

      .hero p {
        font-size: 18px;
        margin-bottom: 20px;
      }

      .btn {
        padding: 10px 20px;
        background: black;
        color: white;
        border: none;
        cursor: pointer;
      }

      /* SECTIONS */
      .section {
        padding: 60px 40px;
        background: white;
        margin-top: 10px;
      }

      .section-title {
        font-size: 24px;
        margin-bottom: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
      }

      .card {
        background: #f0f0f0;
        padding: 20px;
        border: 1px solid #ddd;
        height: 120px;
      }

      /* FOOTER */
      footer {
        background: #111;
        color: white;
        text-align: center;
        padding: 30px;
        margin-top: 20px;
      }

      /* RESPONSIVE */
      @media (max-width: 768px) {
        .grid {
          grid-template-columns: 1fr;
        }

        header {
          flex-direction: column;
          gap: 10px;
        }
      }
    </style>
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">LOGO</div>
      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
      <h1>Main Heading</h1>
      <p>Short supporting subtitle goes here</p>
      <button class="btn">Get Started</button>
    </section>

    <!-- SECTION 1 -->
    <section class="section">
      <div class="section-title">Section Title</div>
      <div class="grid">
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
      </div>
    </section>

    <!-- SECTION 2 -->
    <section class="section">
      <div class="section-title">Another Section</div>
      <div class="grid">
        <div class="card">Feature</div>
        <div class="card">Feature</div>
        <div class="card">Feature</div>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>© 2026 Your Brand. All rights reserved.</footer>
  </body>
</html>
